<script>
    (function () {
        const CLIENT_ID = 'ux9AtiCdagTFzRHWOOkw';

        function mountLivere() {

            const container = document.querySelector('.app__article');

            if (!container) return;

            if (container.querySelector('livere-comment')) return;

            const comment = document.createElement('livere-comment');
            comment.setAttribute('client-id', CLIENT_ID);

            container.appendChild(comment);

            console.log('[Livere] mounted');
        }

        function start() {

            mountLivere();

            const observer = new MutationObserver(() => {
                mountLivere();
            });

            observer.observe(document.body, {
                childList: true,
                subtree: true
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', start);
        } else {
            start();
        }

    })();
</script>

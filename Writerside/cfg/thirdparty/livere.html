<!-- Livere comments with optimizations -->
<script>
    (function() {
        var LIVERE_UID = 'MTAyMC8yOTQyMS81OTg5';
        const loadState = {
            loaded: false,
            lastLoadPath: null
        };

        function shouldShowComments(path) {
            if (!/\.html$/i.test(path)) {
                return false;
            }
            const noComments = [];
            return noComments.indexOf(path) === -1;
        }

        function getCommentContainer() {
            const target = document.querySelector('.app__article .article.text2')
                || document.querySelector('.app__article')
                || document.body;

            if (!target) {
                return null;
            }

            let container = document.getElementById('lv-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'lv-container';
                target.appendChild(container);
            }
            return container;
        }

        function loadLivereScript() {
            // 防止重複加載腳本
            if (document.getElementById('livere-script')) {
                return;
            }

            const script = document.createElement('script');
            script.id = 'livere-script';
            script.src = 'https://cdn-city.livere.com/js/embed.dist.js';
            script.async = true;
            document.body.appendChild(script);
        }

        function loadLivere() {
            const path = window.location.pathname || '';

            if (!shouldShowComments(path)) {
                return;
            }

            const container = getCommentContainer();
            if (!container) {
                return;
            }

            // 設置容器屬性
            container.setAttribute('data-id', 'city');
            container.setAttribute('data-uid', LIVERE_UID);

            // 同路徑不重複加載
            if (path === loadState.lastLoadPath && loadState.loaded) {
                return;
            }

            loadState.lastLoadPath = path;
            loadState.loaded = true;

            // 防止頻繁加載，只加載一次腳本
            loadLivereScript();
        }

        function onReady(fn) {
            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                fn();
            } else {
                window.addEventListener('load', fn);
            }
        }

        // 監聽 SPA 導覽
        (function() {
            const history = window.history;
            if (!history || !history.pushState) {
                return;
            }

            const origPushState = history.pushState;
            history.pushState = function() {
                const ret = origPushState.apply(this, arguments);
                window.dispatchEvent(new Event('locationchange'));
                return ret;
            };

            const origReplaceState = history.replaceState;
            history.replaceState = function() {
                const ret = origReplaceState.apply(this, arguments);
                window.dispatchEvent(new Event('locationchange'));
                return ret;
            };

            window.addEventListener('popstate', function() {
                window.dispatchEvent(new Event('locationchange'));
            });

            window.addEventListener('hashchange', function() {
                window.dispatchEvent(new Event('locationchange'));
            });
        })();

        window.addEventListener('locationchange', function() {
            onReady(loadLivere);
        });

        // 首次载入頁面
        onReady(loadLivere);
    })();
</script>
<noscript>請啟用 JavaScript 以檢視評論功能。</noscript>

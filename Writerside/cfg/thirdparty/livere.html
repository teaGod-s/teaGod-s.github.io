<!-- Livere comments with optimizations -->
<script>
    (function() {
        const LIVERE_CLIENT_ID = 'ux9AtiCdagTFzRHWOOkw';
        const LIVERE_SCRIPT_SRC = 'https://www.livere.org/livere-widget.js';
        let scriptLoaded = false;
        let lastPath = '';

        function shouldShowComments(path) {
            return /\.html$/i.test(path);
        }

        function injectLivere() {
            // 检查是否已存在
            if (document.querySelector('livere-comment')) {
                return;
            }

            // 找到目标容器
            const target = document.querySelector('.app__article .article.text2')
                || document.querySelector('.app__article');

            if (!target) {
                console.warn('Livere: No suitable container found');
                return false;
            }

            // 创建 livere-comment 元素
            const commentEl = document.createElement('livere-comment');
            commentEl.setAttribute('client-id', LIVERE_CLIENT_ID);
            target.appendChild(commentEl);

            return true;
        }

        function loadScript() {
            return new Promise((resolve) => {
                if (scriptLoaded) {
                    resolve();
                    return;
                }

                // 检查脚本是否已在页面中
                const existing = document.querySelector(`script[src="${LIVERE_SCRIPT_SRC}"]`);
                if (existing) {
                    scriptLoaded = true;
                    // 如果已存在，等待加载完成
                    if (existing.getAttribute('data-loaded') === 'true') {
                        resolve();
                    } else {
                        existing.addEventListener('load', () => {
                            existing.setAttribute('data-loaded', 'true');
                            resolve();
                        });
                    }
                    return;
                }

                const script = document.createElement('script');
                script.type = 'module';
                script.src = LIVERE_SCRIPT_SRC;
                script.addEventListener('load', () => {
                    scriptLoaded = true;
                    script.setAttribute('data-loaded', 'true');
                    resolve();
                });
                document.head.appendChild(script);
            });
        }

        async function setupLivere() {
            if (!shouldShowComments(window.location.pathname)) return;

            await loadScript();

            // 脚本加载后稍微等待确保 Web Component 注册完成
            await new Promise(resolve => setTimeout(resolve, 100));

            injectLivere();
        }

        // 监听 DOM 变化，在容器出现时自动注入
        function watchForContainer() {
            return new Promise((resolve) => {
                const target = document.querySelector('.app__article .article.text2')
                    || document.querySelector('.app__article');

                if (target) {
                    resolve();
                    return;
                }

                const observer = new MutationObserver(function(mutations, obs) {
                    const target = document.querySelector('.app__article .article.text2')
                        || document.querySelector('.app__article');
                    if (target) {
                        obs.disconnect();
                        resolve();
                    }
                });

                observer.observe(document.body, {
                    childList: true,
                    subtree: true
                });
            });
        }

        // SPA 路由处理
        function handleRouteChange() {
            const currentPath = window.location.pathname;
            if (currentPath === lastPath) return;
            lastPath = currentPath;

            // 移除旧的评论
            const oldComment = document.querySelector('livere-comment');
            if (oldComment) {
                oldComment.remove();
            }

            if (!shouldShowComments(currentPath)) return;

            // 等待新页面渲染
            setTimeout(async () => {
                await watchForContainer();
                injectLivere();
            }, 300);
        }

        // 劫持路由
        ['pushState', 'replaceState'].forEach(method => {
            const original = history[method];
            history[method] = function(...args) {
                const result = original.apply(this, args);
                setTimeout(handleRouteChange, 100);
                return result;
            };
        });

        window.addEventListener('popstate', () => setTimeout(handleRouteChange, 100));
        window.addEventListener('hashchange', () => setTimeout(handleRouteChange, 100));

        // 首次加载
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', async () => {
                lastPath = window.location.pathname;
                await watchForContainer();
                setupLivere();
            });
        } else {
            lastPath = window.location.pathname;
            watchForContainer().then(() => setupLivere());
        }
    })();
</script>
